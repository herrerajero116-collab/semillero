<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi juego - Jeronimo☢</title>
</head>
<body>
  <div class="papadelgang">
<header>
    <h1>EL MEJOR JUEGO DEL MUNDO MUNDIAL</h1>
    <div class="controls">W/S = jugador izquierdo . flechas = jugador derecho . P = pausar . R = reiniciar . D = modo IA</div>
</header>

<div class="game-card">
    <div class="canvas-wrap">
        <canva id="game" width="900" height="500"></canvas>
            <div class="scanlines"></div>
    </div>

    <div class="hud">
<div class="score">Jugador A: <span id="scoreA">0</span></div>
<div class="score">Jugador B: <span id="scoreB">0</span></div>
<div class="small">Objetivo: 11 puntos - Modo: <span id="modelabel">2 Jugadores</span></div>
    </div>
    <div>
        <div class="settings">
            <button id="toggleAI" class="btn">Cambiar a IA🌊</button>
            <button id="toggleSound" class="btn">Sonidos: ON🤯</button>
            <label for="">Dificultad IA</label>
            <input type="range" id="aiRange" min="0.06" max="0.26" step="0.01" value="0.14">
        </div>
    </div>
</div>

<footer>Hecho por - Jeronimo☢</footer>
  </div>
</body>
</html>
